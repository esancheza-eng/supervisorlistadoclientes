<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElhyCars — Supervisor</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body style="background:#07080f;color:white;font-family:Arial;padding:40px">

<h2>ELHYCARS SUPERVISOR</h2>

<button onclick="cargarExcel()">Cargar Excel</button>

<input type="file" id="archivoExcel" style="display:none">

<div id="estado" style="margin-top:20px;color:#00ff88"></div>

<script type="module">

/* ===================================
   FIREBASE
=================================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "TU_API_KEY",

  authDomain: "listado-cobradores.firebaseapp.com",

  databaseURL: "https://listado-cobradores-default-rtdb.firebaseio.com",

  projectId: "listado-cobradores",

  storageBucket: "listado-cobradores.appspot.com",

  messagingSenderId: "123456",

  appId: "123456"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* ===================================
   CARGAR EXCEL
=================================== */

window.cargarExcel = function(){

document.getElementById("archivoExcel").click();

}

document.getElementById("archivoExcel").addEventListener("change",leerExcel);

function leerExcel(e){

const archivo = e.target.files[0];

const lector = new FileReader();

lector.onload = function(event){

const data = new Uint8Array(event.target.result);

const workbook = XLSX.read(data,{type:"array"});

const hoja = workbook.Sheets[workbook.SheetNames[0]];

const datos = XLSX.utils.sheet_to_json(hoja);

/* ===================================
   ENVIAR A FIREBASE
=================================== */

const referencia = ref(db,"cartera");

set(referencia,datos)

.then(()=>{

document.getElementById("estado").innerHTML="✔ Datos publicados para cobradores";

})

.catch(err=>{

console.error(err);

});

};

lector.readAsArrayBuffer(archivo);

}

</script>

</body>
</html>
